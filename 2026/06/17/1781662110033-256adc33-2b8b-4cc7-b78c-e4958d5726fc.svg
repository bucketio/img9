<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#76a9fa" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#f59e7d" stop-opacity="0.72"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1f2937" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#374151"/>
    </marker>
  </defs>
  <rect width="960" height="540" fill="#f7f8fb"/>
  <text x="480" y="54" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#111827">一个 3D 高斯体包含什么</text>
  <text x="480" y="88" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#4b5563">它可以理解为空间里一个带方向、颜色和透明度的半透明椭球</text>

  <g transform="translate(480 280) rotate(-22)" filter="url(#shadow)">
    <ellipse cx="0" cy="0" rx="190" ry="82" fill="url(#g1)" stroke="#2563eb" stroke-width="3" opacity="0.86"/>
    <ellipse cx="-48" cy="-12" rx="56" ry="24" fill="#ffffff" opacity="0.28"/>
    <line x1="-210" y1="0" x2="210" y2="0" stroke="#1d4ed8" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="-100" x2="0" y2="100" stroke="#dc2626" stroke-width="2" opacity="0.45"/>
  </g>
  <circle cx="480" cy="280" r="6" fill="#111827"/>
  <text x="494" y="276" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#111827">中心位置</text>

  <g font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#111827" stroke="#374151" stroke-width="2" marker-end="url(#arrow)">
    <line x1="255" y1="150" x2="392" y2="226"/>
    <line x1="705" y1="150" x2="600" y2="224"/>
    <line x1="228" y1="390" x2="377" y2="325"/>
    <line x1="724" y1="390" x2="614" y2="322"/>
  </g>

  <g font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="88" y="118" width="190" height="70" rx="8" fill="#ffffff" stroke="#d1d5db"/>
    <text x="183" y="146" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">位置</text>
    <text x="183" y="171" text-anchor="middle" font-size="14" fill="#4b5563">高斯体在空间中的中心</text>

    <rect x="682" y="118" width="190" height="70" rx="8" fill="#ffffff" stroke="#d1d5db"/>
    <text x="777" y="146" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">形状和方向</text>
    <text x="777" y="171" text-anchor="middle" font-size="14" fill="#4b5563">由尺度和协方差描述</text>

    <rect x="88" y="362" width="190" height="70" rx="8" fill="#ffffff" stroke="#d1d5db"/>
    <text x="183" y="390" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">透明度</text>
    <text x="183" y="415" text-anchor="middle" font-size="14" fill="#4b5563">决定对像素贡献强弱</text>

    <rect x="682" y="362" width="190" height="70" rx="8" fill="#ffffff" stroke="#d1d5db"/>
    <text x="777" y="390" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">视角相关颜色</text>
    <text x="777" y="415" text-anchor="middle" font-size="14" fill="#4b5563">常用球谐函数表达</text>
  </g>
</svg>
