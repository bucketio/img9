<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" width="700" height="420">
  <rect width="700" height="420" fill="#1a1a2e"/>
  
  <!-- Window -->
  <rect x="30" y="20" width="120" height="160" rx="3" fill="#16213e" stroke="#2a2a4e" stroke-width="2"/>
  <rect x="35" y="25" width="110" height="150" fill="#0f3460" opacity="0.8"/>
  <!-- Moon -->
  <circle cx="100" cy="60" r="15" fill="#f9d976" opacity="0.8"/>
  <circle cx="108" cy="55" r="12" fill="#0f3460"/>
  
  <!-- Desk -->
  <rect x="150" y="210" width="520" height="15" rx="2" fill="#5c3a1e"/>
  <rect x="150" y="225" width="520" height="8" fill="#4a2e15"/>
  <!-- Desk legs -->
  <rect x="155" y="233" width="8" height="80" fill="#4a2e15"/>
  <rect x="657" y="233" width="8" height="80" fill="#4a2e15"/>
  
  <!-- Scattered papers on desk -->
  <rect x="180" y="185" width="70" height="25" rx="1" fill="#f5f5dc" transform="rotate(-5,215,197)"/>
  <rect x="240" y="190" width="75" height="25" rx="1" fill="#fafad2" transform="rotate(3,277,202)"/>
  <rect x="320" y="180" width="80" height="28" rx="1" fill="#f5f5dc" transform="rotate(-2,360,194)"/>
  <rect x="420" y="185" width="65" height="25" rx="1" fill="#fafad2" transform="rotate(4,452,197)"/>
  <rect x="500" y="188" width="70" height="22" rx="1" fill="#f5f5dc" transform="rotate(-3,535,199)"/>
  
  <!-- Text lines on papers -->
  <line x1="190" y1="195" x2="230" y2="194" stroke="#ccc" stroke-width="1"/>
  <line x1="190" y1="200" x2="225" y2="199" stroke="#ccc" stroke-width="1"/>
  <line x1="250" y1="200" x2="295" y2="201" stroke="#ccc" stroke-width="1"/>
  <line x1="330" y1="192" x2="385" y2="191" stroke="#ccc" stroke-width="1"/>
  <line x1="330" y1="198" x2="380" y2="197" stroke="#ccc" stroke-width="1"/>
  
  <!-- Coffee cup -->
  <rect x="580" y="195" width="25" height="20" rx="2" fill="#ddd" stroke="#bbb" stroke-width="1"/>
  <path d="M605,200 Q612,200 612,208 Q612,213 605,213" fill="none" stroke="#bbb" stroke-width="1.5"/>
  <ellipse cx="592" cy="195" rx="12" ry="3" fill="#8B4513"/>
  <!-- Steam -->
  <path d="M588,190 Q590,180 585,172" fill="none" stroke="#fff" stroke-width="1" opacity="0.3"/>
  <path d="M594,188 Q596,178 591,170" fill="none" stroke="#fff" stroke-width="1" opacity="0.25"/>
  
  <!-- Monitor -->
  <rect x="160" y="160" width="100" height="60" rx="3" fill="#333"/>
  <rect x="163" y="163" width="94" height="54" rx="1" fill="#0a1628"/>
  <text x="210" y="195" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#1a6bff" opacity="0.6">报告编辑中...</text>
  <rect x="205" y="220" width="10" height="8" fill="#444"/>
  
  <!-- Lamp -->
  <rect x="630" y="140" width="4" height="80" fill="#888"/>
  <path d="M615,140 L650,140 L642,130 L620,130 Z" fill="#ffd700" opacity="0.7"/>
  <ellipse cx="632" cy="140" rx="20" ry="5" fill="#ffd700" opacity="0.15"/>
  
  <!-- Ambient light cone -->
  <polygon points="620,140 600,220 660,220" fill="#ffd700" opacity="0.03"/>
  
  <!-- Person silhouette -->
  <ellipse cx="400" cy="240" rx="80" ry="5" fill="#000" opacity="0.2"/>
  
  <!-- Chair back -->
  <rect x="375" y="195" width="50" height="50" rx="5" fill="#333" opacity="0.5"/>
  
  <!-- Clock on wall -->
  <circle cx="650" cy="60" r="20" fill="#2a2a4e" stroke="#444" stroke-width="2"/>
  <line x1="650" y1="60" x2="650" y2="48" stroke="#888" stroke-width="1.5"/>
  <line x1="650" y1="60" x2="658" y2="62" stroke="#888" stroke-width="1"/>
  
  <!-- Title overlay -->
  <rect x="0" y="340" width="700" height="40" fill="#000" opacity="0.5"/>
  <text x="350" y="365" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="14" fill="#fff">深夜办公室：散落的报告、凉掉的咖啡、未眠的工程咨询人</text>
</svg>
