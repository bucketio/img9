  <line x1="448" y1="112" x2="543" y2="150" stroke="#1a6bff" stroke-width="0.5" opacity="0.2"/>
  <line x1="543" y1="150" x2="588" y2="215" stroke="#1a6bff" stroke-width="0.5" opacity="0.2"/>
  
