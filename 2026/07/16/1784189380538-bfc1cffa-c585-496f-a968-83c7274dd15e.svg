<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400">
  <rect width="700" height="400" fill="#f8f9fa" rx="8"/>
  <rect x="0" y="0" width="700" height="400" fill="none" stroke="#dee2e6" stroke-width="1" rx="8"/>
  <text x="350" y="30" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="15" font-weight="bold" fill="#2c3e50">AI赋能工程咨询全链条 — 10大关键场景</text>
  
  <!-- Central hub -->
