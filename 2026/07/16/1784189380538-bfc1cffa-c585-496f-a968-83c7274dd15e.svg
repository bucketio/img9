    <rect width="60" height="18" rx="9" fill="#5b6abf" opacity="0.12"/>
    <text x="30" y="13" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="9" fill="#5b6abf">施工管理</text>
  </g>
  <g transform="translate(580, 340)">
