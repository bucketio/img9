    <text x="0" y="5" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="bold" fill="#1a6bff">智设</text>
    <text x="0" y="28" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="9" fill="#555">方案设计</text>
